<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Power Fit</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="media-querry.css">
    <script src="https://kit.fontawesome.com/ac52fd1507.js" crossorigin="anonymous"></script>
</head>
<body>
    <header>
        <section class="cabeca">
            <img class="logo" src="imagens/power-logo.png" alt="">
            <nav id="media-pc" class="menu">
                <a href="#">Inicio</a>
                <a href="#">Planos</a>
                <a href="#">Contato</a>
                <a href="#">Local</a>
            </nav>
            <nav class="media-menu">
                <a class="botao" href="#"><i class="fa-brands fa-whatsapp"></i>FALE CONOSCO</a>
                <div id="ham">
                    <i class="fa-solid fa-bars"></i>
                </div>
            </nav>
        </section>
        <section class="banner">

        </section>
    </header>
    <script>
    const bot = document.getElementById('ham')
    const mediaPC = document.getElementById('media-pc')

    bot.addEventListener('click', () => {
        mediaPC.classList.toggle('ativo')
    })
</script>
</body>
</html>
